services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: bg-company-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bg-company-web.rule=Host(`bgcompanyoffice.cloud`) || Host(`www.bgcompanyoffice.cloud`)"
      - "traefik.http.routers.bg-company-web.entrypoints=websecure"
      - "traefik.http.routers.bg-company-web.tls=true"
      - "traefik.http.routers.bg-company-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.bg-company-web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  hermes-bridge:
    build:
      context: .
      dockerfile: services/hermes-bridge/Dockerfile
    container_name: bg-company-hermes-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-}
      HERMES_BRIDGE_TIMEOUT_MS: ${HERMES_BRIDGE_TIMEOUT_MS:-45000}
      HERMES_BRIDGE_MAX_STDOUT_BYTES: ${HERMES_BRIDGE_MAX_STDOUT_BYTES:-200000}
      HERMES_BRIDGE_MAX_CONCURRENCY: ${HERMES_BRIDGE_MAX_CONCURRENCY:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    container_name: bg-company-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - bg_company_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  bg_company_postgres_data:
